# ============================================================================
# Cấu hình nginx cho backend weather. CHỌN 1 trong 2 cách bên dưới,
# tùy bạn có domain riêng hay dùng chung nginx với cropguard.
# Backend chạy ở 127.0.0.1:4000 (theo docker-compose.yml).
# ============================================================================

upstream weather_api {
    server 127.0.0.1:4000;
}

# ----------------------------------------------------------------------------
# CÁCH A — Subdomain riêng (khuyến nghị nếu có domain, vd weather.example.com)
# Đặt file này vào /etc/nginx/sites-available/ rồi symlink sang sites-enabled,
# hoặc thêm vào conf.d/. Sau đó chạy certbot để có HTTPS.
# ----------------------------------------------------------------------------
server {
    listen 80;
    server_name weather.example.com;   # ĐỔI thành domain của bạn
    # Certbot sẽ tự thêm block 443. Tạm thời cho HTTP để lấy cert.

    location / {
        proxy_pass http://weather_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ----------------------------------------------------------------------------
# CÁCH B — Dùng CHUNG server block sẵn có của cropguard, thêm path riêng.
# Chỉ cần COPY location này vào server{} (block 443) của cropguard,
# rồi `nginx -s reload`. App sẽ gọi:  https://<domain-cropguard>/weather/api/...
# (dấu / cuối ở proxy_pass sẽ cắt bỏ tiền tố /weather).
