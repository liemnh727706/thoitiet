name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # cho phép bấm chạy tay trong tab Actions

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app   # app Flutter nằm trong thư mục app/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Cấu hình Firebase (google-services.json từ secret nếu có)
        env:
          GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GS" ]; then
            echo "$GS" | base64 -d > android/app/google-services.json
            echo "✅ Đã ghi google-services.json — FCM sẽ được bật trong APK"
          else
            echo "ℹ️ Chưa có secret GOOGLE_SERVICES_JSON — build không FCM (bình thường)"
          fi

      - name: Cài dependencies
        run: flutter pub get

      - name: Phân tích code
        run: flutter analyze

      - name: Chạy test
        run: flutter test

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
